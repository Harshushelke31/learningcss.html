<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zindex</title>
    <style>
        .z-container{
            position: relative;
            margin: 50px;

        }
        div {
            width: 150px;
            height: 150px;
            border-radius: 100px;
            position: absolute;
            text-align: center;
            font-size: 20px;
            border:2px solid white;
        }

        .blue{
            background-color: blue;
            left: 40px;
            z-index: 2;
        }

        .green{
            background-color:green;
            left: 80px;
            z-index: 1;
        }

        .red{
            background-color: red;
            left: 120px;
            z-index: 3;
        }
        .z-container1{
            position: relative;
            margin: 50px;
        }

        div{
            height: 150px;
            width: 150px;
            border-radius: 100px;
            position: absolute;
            font-size: 20px;
           border: 10px sloid red;

        }

        .circle1{
            background-color: blueviolet;
            border: 3px solid red;
            z-index: 5;
            
        }

        .circle2{
            background-color: aqua;
            border:3px solid black;
            z-index: 4;
        }

        .circle3{
            background-color: blue;
            border:3px solid white;
            z-index: 3;
        }

        .z-container3{
           position: relative;
           margin: 100px;
        }
        div{
            
            position: absolute;
            
            
        }
        .img1{
            border:4px solid black;
            height: 200px;
            width: 200px;
            z-index: 2;
        }

        .img2{
            border:6px solid black;
            height: 200px;
            width: 200px;
            z-index: ;
           margin-top: none;
            
        }
    </style>
</head>
<body>
    <div class="z-container">
        <div class="blue">Blue</div>
        <div class="green">Green</div>
        <div class="red">Red</div>
    </div>

    <div class="z-container1">
        <div class="circle1">Harshu</div><br><br>
        <div class="circle2">Anil</div><br><br>
        <div class="circle3">Shelke</div><br><br>

        <div class="z-container3">
            <img class="img1" src="images/lovely baby cat.jfif">
            <img class="img2" src="images/istockphoto-472302857-1024x1024.jpg">
        </div>
    </div>
</body>
</html>
